# Render Blueprint for the PyMuPDF edit backend (the frontend stays on Netlify).
# Deploy: push this repo to GitHub, then on render.com -> New + -> Blueprint -> pick this repo.
# Render builds from the backend/ subdir, installs requirements, and runs gunicorn over HTTPS.
services:
  - type: web
    name: pdf-editor-backend
    runtime: python
    rootDir: backend
    # NOTE: this line is the source of truth for the service plan — Render resets the dashboard
    # plan to match it on every Blueprint sync, so keep it at the plan you are paying for.
    plan: standard
    buildCommand: pip install -r requirements.txt
    # 1 worker: each worker holds a whole base64 PDF + PyMuPDF's multiple-of-that working set in
    # RAM, so a couple of concurrent large uploads per worker are memory-heavy. Standard (2 GB)
    # has headroom over the old free tier, but we keep a single worker because it also makes the
    # in-memory rate limiter exact (no per-worker x N). Raise --workers if you need more concurrency.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      # Rate-limit counters live in-process and are exact with the single worker above.
      # If you ever raise --workers or run multiple instances, set RATELIMIT_STORAGE_URI to
      # a Redis URL so the limit stays exact and survives restarts (see app.py).
      # - key: RATELIMIT_STORAGE_URI
      #   value: "redis://<host>:6379"
